<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENAC ZN - Controle de Insumos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Sistema de Estoque — Enfermagem</h1>
        <p>SENAC Zona Norte | Responsável: <strong>Enfermeira Camila</strong></p>
    </header>

    <main>
        <section class="form-section">
            <h2>Cadastrar Novo Material</h2>
            <div class="form-row">
                <div class="form-group">
                    <label for="input-nome">Nome do Material</label>
                    <input type="text" id="input-nome" placeholder="Ex: Luvas de procedimento">
                </div>
                <div class="form-group">
                    <label for="input-quantidade">Quantidade</label>
                    <input type="number" id="input-quantidade" min="0" placeholder="Ex: 100">
                </div>
                <button id="btn-cadastrar">Cadastrar</button>
            </div>
        </section>

        <section class="list-section">
            <div class="list-header">
                <h2>Materiais Cadastrados - <span id="total-itens">0</span> itens</h2>
                <input type="text" id="input-busca" placeholder="Pesquisar material...">
            </div>
            <div class="form-group">
                <label for="input-retirada">Quantidade a Retirar</label>
                <input type="number" id="input-retirada" min="1" placeholder="Ex: 5">
                <small class="dica-retirada">Informe aqui e confirme em "Editar → Baixar" no item desejado.</small>
            </div>

            <ul id="lista-materiais">
                <li>Carregando...</li>
            </ul>
        </section>
    </main>

    <script src="main.js" defer></script>
</body>
</html>
