<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SENAC ZN - Controle de Insumos</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header>
  <div class="hc">
    <h1>Sistema de Estoque — Enfermagem</h1>
    <p class="sub">SENAC Zona Norte | Responsável: <strong>Enfermeira Camila</strong></p>
  </div>
</header>
<main>
      <section class="kpis">
    <div class="kpi"><h4>Total de Itens</h4><p id="txt-total">0</p></div>
    <div class="kpi w"><h4>Estoque Crítico (&lt;20 un)</h4><p id="txt-critico">0</p></div>
    <div class="kpi v"><h4>Vencendo em 30 dias</h4><p id="txt-validade">0</p></div>
  </section>
  <div id="banner"></div>
  <section class="box">
    <h2> Cadastrar Novo Insumo / Reposição</h2>
    <form id="form-cadastro">
      <div class="grid">
        <div class="fg"><label>Nome do Produto</label><input type="text" id="insumo-nome" placeholder="Ex: Luvas de procedimento" required></div>
        <div class="fg"><label>Categoria</label>
          <select id="insumo-categoria" required>
            <option value="">Selecione...</option>
            <option>EPI</option><option>Medicamento</option><option>Material Cirúrgico</option><option>Higiene</option><option>Diagnóstico</option><option>Outros</option>
          </select>
        </div>
        <div class="fg"><label>Unidade de Medida</label><input type="text" id="insumo-unidade" placeholder="Ex: Caixa (100 un)" required></div>
        <div class="fg"><label>Quantidade Inicial</label><input type="number" id="insumo-estoque" min="0" required></div>
        <div class="fg"><label>Data de Validade</label><input type="date" id="insumo-validade" required></div>
        <div class="fg wide"><label>Observações</label><input type="text" id="insumo-obs" placeholder="Ex: Inflamável, sensível à luz..."></div>
      </div>
      <button type="submit" id="btn-cadastrar" class="btn-save">Gravar no Inventário</button>
    </form>
